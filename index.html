<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Portfolio | Home</title>
    <style>
        /* Modern Reset & Base Variables */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-gradient: linear-gradient(135deg, #38bdf8, #818cf8);
            --font-stack: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-stack);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Container Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Navigation Bar */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            backdrop-filter: blur(12px);
            background-color: rgba(15, 23, 42, 0.8);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding-top: 80px;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 4rem;
            align-items: center;
        }

        .hero-text h1 {
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .hero-text h1 span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            max-width: 540px;
        }

        /* Beautiful Buttons */
        .btn-group {
            display: flex;
            gap: 1rem;
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }

        .btn-secondary {
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Visual Element Box */
        .hero-visual {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .glow-sphere {
            width: 300px;
            height: 300px;
            background: var(--accent-gradient);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.3;
            position: absolute;
            animation: pulse 8s infinite alternate;
        }

        .card-mockup {
            width: 100%;
            max-width: 360px;
            height: 400px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        .card-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 1.5rem;
            border: 2px solid var(--accent);
        }

        .card-line {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-bottom: 0.75rem;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.2; }
            100% { transform: scale(1.2); opacity: 0.4; }
        }

        /* Responsive Breakpoints */
        @media (max-width: 968px) {
            .hero-grid {
                grid-template-columns: 1fr;
                gap: 3rem;
                text-align: center;
            }
            .hero-text p {
                margin: 0 auto 2.5rem auto;
            }
            .btn-group {
                justify-content: center;
            }
            .nav-links {
                display: none; /* Can be handled with JS for mobile menu toggle */
            }
        }
    </style>
</head>
<body>

    <!-- Header & Navigation -->
    <header>
        <div class="container">
            <nav>
                <div class="logo">CREATIVE.</div>
                <ul class="nav-links">
                    <li><a href="#home">Home</a></li>
                    <li><a href="#work">Work</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Hero Landing -->
    <main>
        <section class="hero" id="home">
            <div class="container">
                <div class="hero-grid">
                    <div class="hero-text">
                        <h1>Design. Develop.<br><span>Innovate.</span></h1>
                        <p>A beautiful minimal landing page framework cleanly designed with modern CSS layout paradigms, fluid typography, and premium user interaction layouts.</p>
                        <div class="btn-group">
                            <a href="#work" class="btn btn-primary">View Projects</a>
                            <a href="#contact" class="btn btn-secondary">Get In Touch</a>
                        </div>
                    </div>
                    <div class="hero-visual">
                        <div class="glow-sphere"></div>
                        <div class="card-mockup">
                            <div class="card-avatar"></div>
                            <div class="card-line" style="width: 60%"></div>
                            <div class="card-line" style="width: 80%"></div>
                            <div class="card-line" style="width: 40%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
